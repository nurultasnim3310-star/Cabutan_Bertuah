<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pemenang Cabutan Bertuah</title>

    <script src="jquery-4.0.0.min.js"></script>
    <script src="script.js"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        input{
            padding: 8px;
            width: 200px;
        }

        button{
            padding: 8px 15px;
            margin: 5px;
        }

        #winner{
            font-size: 30px;
            font-weight: bold;
            color: green;
            margin-top: 20px;
        }

        ul{
            list-style: none;
            padding: 0;
        }
    </style>
</head>
<body>

    <h1>Cabutan Bertuah</h1>

    <input type="text" id="nama" placeholder="Masukkan nama peserta">
    <button id="tambah">SIMPAN</button>

    <h3>Senarai Peserta</h3>
    <ul id="senarai"></ul>

    <button id="pemenang">PEMENANG</button>

    <div id="winner"></div>

</body>
</html>
